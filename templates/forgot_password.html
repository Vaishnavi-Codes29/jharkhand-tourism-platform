<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Jharkhand Tourism</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem; }
        .container { background: white; border-radius: 16px; box-shadow: 0 18px 50px rgba(0,0,0,0.18); width: 100%; max-width: 420px; padding: 2rem; }
        .header { text-align: center; margin-bottom: 1.5rem; }
        .header h1 { color: #222; font-size: 1.9rem; margin-bottom: 0.25rem; }
        .header p { color: #666; font-size: 0.95rem; }
        .form-group { margin-bottom: 1.25rem; }
        label { display: block; margin-bottom: 0.5rem; color: #333; font-weight: 600; }
        input { width: 100%; padding: 0.85rem 1rem; border: 2px solid #e4e7f0; border-radius: 10px; background: #fbfbff; font-size: 1rem; transition: border-color 0.25s ease; }
        input:focus { outline: none; border-color: #667eea; box-shadow: 0 0 0 4px rgba(102,126,234,0.12); }
        .btn { width: 100%; padding: 0.95rem; border: none; border-radius: 10px; background: #4f46e5; color: white; font-size: 1rem; font-weight: 700; cursor: pointer; transition: transform 0.2s ease, box-shadow 0.2s ease; }
        .btn:hover { transform: translateY(-1px); box-shadow: 0 12px 24px rgba(79,70,229,0.16); }
        .message { display: none; padding: 0.95rem 1rem; border-radius: 10px; margin-bottom: 1rem; font-size: 0.95rem; }
        .error { background: #ffe4e6; color: #a81d2c; border: 1px solid #faa2c1; }
        .success { background: #ecfdf5; color: #166534; border: 1px solid #bbf7d0; }
        .meta { text-align: center; margin-top: 1.25rem; color: #4b5563; font-size: 0.95rem; }
        .meta a { color: #4f46e5; text-decoration: none; font-weight: 600; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Forgot Password</h1>
            <p>Enter your registered email address and we'll send a reset OTP.</p>
        </div>
        <div id="message" class="message"></div>
        <form id="forgotForm">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" placeholder="you@example.com" required>
            </div>
            <button type="submit" class="btn">Send Reset OTP</button>
        </form>
        <div class="meta">
            <p>Remembered your password? <a href="/login">Sign in</a></p>
        </div>
    </div>
    <script>
        const message = document.getElementById('message');
        document.getElementById('forgotForm').addEventListener('submit', async (event) => {
            event.preventDefault();
            message.style.display = 'none';
            const email = document.getElementById('email').value.trim();
            if (!email) return;
            try {
                const response = await fetch('/auth/forgot-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });
                const data = await response.json();
                if (data.status === 'success') {
                    message.textContent = data.message;
                    message.className = 'message success';
                    message.style.display = 'block';
                    setTimeout(() => window.location.href = '/reset-password', 2200);
                } else {
                    message.textContent = data.message || 'Unable to send reset OTP.';
                    message.className = 'message error';
                    message.style.display = 'block';
                }
            } catch (err) {
                message.textContent = 'Unable to connect to the server.';
                message.className = 'message error';
                message.style.display = 'block';
            }
        });
    </script>
</body>
</html>
