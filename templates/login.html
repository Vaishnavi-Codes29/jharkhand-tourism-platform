<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Jharkhand Tourism</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        
        .container {
            background: white;
            border-radius: 8px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 400px;
            padding: 2rem;
        }
        
        .header {
            text-align: center;
            margin-bottom: 2rem;
        }
        
        .logo {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
        }
        
        h1 {
            color: #333;
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
        }
        
        .subtitle {
            color: #666;
            font-size: 0.9rem;
        }
        
        .form-group {
            margin-bottom: 1.5rem;
        }
        
        label {
            display: block;
            margin-bottom: 0.5rem;
            color: #333;
            font-weight: 500;
        }
        
        input {
            width: 100%;
            padding: 0.75rem;
            border: 2px solid #ddd;
            border-radius: 4px;
            font-size: 1rem;
            transition: border-color 0.3s;
        }
        
        input:focus {
            outline: none;
            border-color: #667eea;
            background: #f8f9ff;
        }
        
        .btn {
            width: 100%;
            padding: 0.75rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        .btn:active {
            transform: translateY(0);
        }
        
        .links {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 1.5rem;
            font-size: 0.9rem;
        }
        
        .links a {
            color: #667eea;
            text-decoration: none;
            transition: color 0.3s;
        }
        
        .links a:hover {
            color: #764ba2;
            text-decoration: underline;
        }
        
        .signup-link {
            text-align: center;
            margin-top: 1.5rem;
            color: #666;
        }
        
        .signup-link a {
            color: #667eea;
            font-weight: bold;
            text-decoration: none;
        }
        
        .error-message {
            background: #fee;
            color: #c33;
            padding: 0.75rem;
            border-radius: 4px;
            margin-bottom: 1rem;
            display: none;
            border-left: 4px solid #c33;
        }
        
        .success-message {
            background: #efe;
            color: #3c3;
            padding: 0.75rem;
            border-radius: 4px;
            margin-bottom: 1rem;
            display: none;
            border-left: 4px solid #3c3;
        }
        
        .loading {
            display: none;
            text-align: center;
            color: #667eea;
        }
        
        .loading::after {
            content: " ⏳";
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">🏞️</div>
            <h1>Jharkhand Tourism</h1>
            <p class="subtitle">Sign in to your account</p>
        </div>
        
        <div class="error-message" id="errorMsg"></div>
        <div class="success-message" id="successMsg"></div>
        
        <form id="loginForm">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input 
                    type="email" 
                    id="email" 
                    name="email" 
                    placeholder="your@email.com" 
                    required
                >
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <div style="position:relative;">
                    <input 
                        type="password" 
                        id="password" 
                        name="password" 
                        placeholder="Enter your password" 
                        required
                    >
                    <button type="button" id="togglePassword" style="position:absolute; right:0.75rem; top:50%; transform:translateY(-50%); border:none; background:transparent; color:#667eea; cursor:pointer; font-size:0.95rem;">Show</button>
                </div>
            </div>
            
            <div class="links">
                <label>
                    <input type="checkbox" name="remember" id="rememberMe"> Remember me
                </label>
                <a href="/forgot-password">Forgot password?</a>
            </div>
            
            <button type="submit" class="btn">Sign In</button>
        </form>
        
        <div class="loading" id="loading"></div>
        
        <div class="signup-link">
            Don't have an account? <a href="/register">Create one</a>
        </div>
    </div>
    
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const rememberMe = document.getElementById('rememberMe').checked;
            const errorMsg = document.getElementById('errorMsg');
            const loading = document.getElementById('loading');
            
            errorMsg.style.display = 'none';
            loading.style.display = 'block';
            
            try {
                const response = await fetch('/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password, remember_me: rememberMe })
                });
                
                const data = await response.json();
                
                if (data.status === 'success') {
                    const userData = {
                        id: data.user_id,
                        email,
                        name: data.user_name,
                        role: data.user_role
                    };
                    sessionStorage.setItem('user', JSON.stringify(userData));
                    sessionStorage.setItem('authToken', data.token);
                    if (rememberMe) {
                        localStorage.setItem('user', JSON.stringify(userData));
                        localStorage.setItem('authToken', data.token);
                    } else {
                        localStorage.removeItem('user');
                        localStorage.removeItem('authToken');
                    }

                    if (data.user_role === 'admin' || data.user_role === 'government_official') {
                        window.location.href = '/admin_dashboard';
                    } else if (data.user_role === 'homestay_owner') {
                        window.location.href = '/homestay_dashboard';
                    } else if (['guide', 'artisan'].includes(data.user_role)) {
                        window.location.href = '/provider_dashboard';
                    } else {
                        window.location.href = '/tourist_dashboard';
                    }
                } else {
                    errorMsg.textContent = data.message || 'Login failed. Please try again.';
                    errorMsg.style.display = 'block';
                }
            } catch (err) {
                errorMsg.textContent = 'Error connecting to server. Please try again.';
                errorMsg.style.display = 'block';
                console.error('Login error:', err);
            } finally {
                loading.style.display = 'none';
            }
        });

            document.getElementById('togglePassword').addEventListener('click', () => {
                const passwordInput = document.getElementById('password');
                const toggleButton = document.getElementById('togglePassword');
                if (passwordInput.type === 'password') {
                    passwordInput.type = 'text';
                    toggleButton.textContent = 'Hide';
                } else {
                    passwordInput.type = 'password';
                    toggleButton.textContent = 'Show';
                }
            });

            document.addEventListener('DOMContentLoaded', () => {
                const storedUser = localStorage.getItem('user');
                if (storedUser) {
                    try {
                        const parsed = JSON.parse(storedUser);
                        if (parsed.email) {
                            document.getElementById('email').value = parsed.email;
                            document.getElementById('rememberMe').checked = true;
                        }
                    } catch (error) {
                        console.warn('Failed to parse stored user data:', error);
                        localStorage.removeItem('user');
                        localStorage.removeItem('authToken');
                    }
                }
            });
