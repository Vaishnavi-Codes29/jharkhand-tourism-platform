<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - Jharkhand Tourism</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f7ff; min-height: 100vh; padding: 2rem; }
        .page { max-width: 960px; margin: 0 auto; }
        .card { background: white; border-radius: 18px; box-shadow: 0 20px 45px rgba(15, 23, 42, 0.08); padding: 2rem; margin-bottom: 1.5rem; }
        .section-title { font-size: 1.6rem; color: #111827; margin-bottom: 0.75rem; }
        .grid { display: grid; gap: 1rem; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); }
        .form-group { margin-bottom: 1rem; }
        label { display: block; margin-bottom: 0.5rem; color: #374151; font-weight: 600; }
        input, select, textarea { width: 100%; padding: 0.95rem 1rem; border: 1px solid #d1d5db; border-radius: 12px; background: #f8fafc; font-size: 1rem; }
        input:focus, select:focus, textarea:focus { outline: none; border-color: #4338ca; box-shadow: 0 0 0 4px rgba(67,56,202,0.12); }
        .btn { padding: 0.95rem 1.25rem; border: none; border-radius: 12px; background: #4338ca; color: white; font-size: 1rem; font-weight: 700; cursor: pointer; transition: transform 0.2s ease; }
        .btn:hover { transform: translateY(-1px); }
        .status { display: inline-flex; align-items: center; gap: 0.5rem; padding: 0.65rem 0.9rem; border-radius: 999px; background: #eef2ff; color: #4338ca; font-weight: 600; font-size: 0.95rem; }
        .message { display: none; padding: 1rem 1.1rem; border-radius: 12px; margin-bottom: 1rem; font-size: 0.95rem; }
        .error { background: #fee2e2; color: #b91c1c; }
        .success { background: #dcfce7; color: #166534; }
        .nav-link { color: #4338ca; text-decoration: none; font-weight: 600; }
    </style>
</head>
<body>
    <div class="page">
        <div class="card">
            <div class="section-title">My Profile</div>
            <p>Update your account details and review verification status.</p>
            <div id="message" class="message"></div>
            <div class="grid">
                <div class="form-group">
                    <label>Name</label>
                    <input type="text" id="name" disabled>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="email" disabled>
                </div>
                <div class="form-group">
                    <label>Phone</label>
                    <input type="text" id="phone">
                </div>
                <div class="form-group">
                    <label>Role</label>
                    <input type="text" id="role" disabled>
                </div>
                <div class="form-group">
                    <label>Verification Status</label>
                    <div id="verificationStatus" class="status">Loading...</div>
                </div>
                <div class="form-group">
                    <label>City</label>
                    <input type="text" id="city">
                </div>
                <div class="form-group">
                    <label>Bio</label>
                    <textarea id="bio" rows="4"></textarea>
                </div>
                <div class="form-group">
                    <label>New Password (optional)</label>
                    <input type="password" id="password" placeholder="Enter new password">
                </div>
                <div class="form-group">
                    <label>Confirm New Password</label>
                    <input type="password" id="confirmPassword" placeholder="Confirm new password">
                </div>
            </div>
            <button class="btn" id="saveBtn">Save Profile</button>
            <p style="margin-top:1rem; color:#4b5563; font-size:0.95rem;">Want to close your session? <a href="/logout" class="nav-link">Logout</a></p>
        </div>
    </div>
    <script>
        const message = document.getElementById('message');
        const authToken = sessionStorage.getItem('authToken') || localStorage.getItem('authToken');

        async function loadProfile() {
            if (!authToken) {
                window.location.href = '/login';
                return;
            }
            try {
                const response = await fetch('/auth/profile', {
                    method: 'GET',
                    headers: { 'Authorization': `Bearer ${authToken}` }
                });
                const data = await response.json();
                if (data.status === 'success') {
                    const user = data.user;
                    document.getElementById('name').value = user.name;
                    document.getElementById('email').value = user.email;
                    document.getElementById('phone').value = user.phone || '';
                    document.getElementById('role').value = user.role;
                    document.getElementById('city').value = user.city || '';
                    document.getElementById('bio').value = user.bio || '';
                    document.getElementById('verificationStatus').textContent = user.verification_status || 'none';
                } else {
                    throw new Error(data.message || 'Unable to load profile');
                }
            } catch (err) {
                window.location.href = '/login';
            }
        }

        document.getElementById('saveBtn').addEventListener('click', async () => {
            message.style.display = 'none';
            const phone = document.getElementById('phone').value.trim();
            const city = document.getElementById('city').value.trim();
            const bio = document.getElementById('bio').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            if (password && password !== confirmPassword) {
                message.textContent = 'Passwords must match.';
                message.className = 'message error';
                message.style.display = 'block';
                return;
            }

            const payload = { phone, city, bio };
            if (password) payload.password = password;

            try {
                const response = await fetch('/auth/profile', {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${authToken}`
                    },
                    body: JSON.stringify(payload)
                });
                const data = await response.json();
                if (data.status === 'success') {
                    message.textContent = 'Profile updated successfully.';
                    message.className = 'message success';
                    message.style.display = 'block';
                    document.getElementById('password').value = '';
                    document.getElementById('confirmPassword').value = '';
                } else {
                    message.textContent = data.message || 'Unable to update profile.';
                    message.className = 'message error';
                    message.style.display = 'block';
                }
            } catch (err) {
                message.textContent = 'Unable to connect to the server.';
                message.className = 'message error';
                message.style.display = 'block';
            }
        });

        loadProfile();
    </script>
</body>
</html>
